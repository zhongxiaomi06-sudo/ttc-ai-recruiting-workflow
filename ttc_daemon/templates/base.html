<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TTC AI 猎头工作台{% endblock %}</title>
  <style>
    :root {
      --bg: #0a0a0f; --card: #13131a; --border: #1e1e2e;
      --text: #c8c8d4; --heading: #e8e8f0; --accent: #6c5ce7;
      --accent2: #00cec9; --green: #00b894; --red: #e17055;
      --yellow: #fdcb6e; --blue: #74b9ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg); color:var(--text); line-height:1.7;
    }
    header {
      background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 100%);
      padding:24px 32px; border-bottom:1px solid var(--border);
    }
    header h1 { color:var(--heading); font-size:1.3em; }
    header p { color:#8888aa; font-size:.9em; margin-top:4px; }
    .container { max-width:960px; margin:0 auto; padding:32px 24px 80px; }
    h2 { color:var(--heading); font-size:1.2em; margin:32px 0 14px; padding-bottom:6px; border-bottom:2px solid var(--accent); display:inline-block; }
    h3 { color:var(--accent2); font-size:1.05em; margin:22px 0 10px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin:14px 0; }
    .card.green { border-left:4px solid var(--green); }
    .card.yellow { border-left:4px solid var(--yellow); }
    .card.red { border-left:4px solid var(--red); }
    .card.blue { border-left:4px solid var(--blue); }
    .tag { display:inline-block; background:#1a1a2e; border:1px solid var(--border); padding:3px 10px; border-radius:12px; font-size:.78em; color:var(--accent2); margin-right:6px; }
    .score { font-size:1.4em; color:var(--accent2); font-weight:700; }
    .muted { color:#777; font-size:.9em; }
    .section { margin:14px 0; }
    .section-title { color:var(--heading); font-weight:600; margin-bottom:6px; }
    ul { margin-left:20px; }
    li { margin:4px 0; }
    form { margin-top:18px; }
    label { display:block; margin:12px 0 4px; color:var(--heading); font-size:.9em; }
    select, textarea, input[type="text"], input[type="number"] {
      width:100%; background:#0d0d14; border:1px solid var(--border); color:var(--text);
      padding:10px 12px; border-radius:6px; font-size:.95em;
    }
    textarea { min-height:100px; resize:vertical; }
    .radio-group { display:flex; gap:12px; flex-wrap:wrap; margin:8px 0; }
    .radio-group label { display:flex; align-items:center; gap:6px; width:auto; cursor:pointer; }
    .btn {
      display:inline-block; background:var(--accent); color:#fff; border:none;
      padding:10px 22px; border-radius:6px; cursor:pointer; font-size:.95em; margin-top:12px;
    }
    .btn:hover { background:#5848c2; }
    .btn-secondary { background:#2d2d44; }
    table { width:100%; border-collapse:collapse; margin:12px 0; font-size:.9em; }
    th { text-align:left; padding:10px; border-bottom:2px solid var(--border); color:var(--accent2); }
    td { padding:10px; border-bottom:1px solid var(--border); }
    a { color:var(--blue); text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <header>
    <h1>TTC AI 猎头工作台</h1>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
