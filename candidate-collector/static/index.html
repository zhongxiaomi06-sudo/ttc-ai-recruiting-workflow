<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TTC 候选人数据收藏器</title>
  <style>
    :root{--bg:#f4f1ea;--ink:#172026;--card:#fffdf8;--line:#d7d1c5;--accent:#0d6f63;--hot:#b55036;--muted:#6d746f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 system-ui,-apple-system,"PingFang SC",sans-serif}.wrap{max-width:1180px;margin:auto;padding:28px}header{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:22px}h1{font-size:32px;letter-spacing:-1px;margin:0}.sub{color:var(--muted);max-width:650px}.badge{background:#dcebe7;color:var(--accent);padding:6px 10px;border-radius:999px;font-weight:700}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 8px 24px #26352c0c}.card h2{font-size:16px;margin:0 0 12px}input,textarea,button{font:inherit}input,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;background:white}textarea{min-height:92px;resize:vertical}button{border:0;border-radius:9px;padding:10px 14px;background:var(--accent);color:white;font-weight:700;cursor:pointer}button.secondary{background:#ebe7dd;color:var(--ink)}.row{display:flex;gap:8px;margin-top:10px}.row>*:first-child{flex:1}.stats{display:flex;gap:10px;margin:18px 0}.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:130px}.stat b{font-size:24px;display:block}.table-card{margin-top:14px;padding:0;overflow:hidden}.toolbar{padding:14px;display:flex;gap:10px;border-bottom:1px solid var(--line)}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:12px 14px;border-bottom:1px solid #ebe6dc;vertical-align:top}th{color:var(--muted);font-size:12px;text-transform:uppercase}.score{font-size:22px;font-weight:800;color:var(--accent)}.score.hot{color:var(--hot)}a{color:var(--accent)}.pill{display:inline-block;padding:3px 7px;border-radius:999px;background:#eee9df;margin:2px;font-size:12px}.empty{padding:36px;text-align:center;color:var(--muted)}dialog{width:min(850px,92vw);border:1px solid var(--line);border-radius:14px;padding:0;background:var(--card)}dialog::backdrop{background:#172026aa}.modal-head{padding:18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.modal-body{padding:18px;max-height:70vh;overflow:auto}.raw{white-space:pre-wrap;background:#f3efe6;border-radius:9px;padding:12px}.notice{color:var(--muted);font-size:12px;margin-top:8px}.error{color:#a3342f}.ok{color:var(--accent)}@media(max-width:850px){.grid{grid-template-columns:1fr}header{display:block}table{font-size:12px}.wrap{padding:16px}}
  </style>
</head>
<body>
<div class="wrap">
  <header><div><h1>TTC 候选人数据收藏器</h1><div class="sub">收藏已授权候选人页面、公开网页和 PDF，保留来源证据并按启承资本画像初评。</div></div><span class="badge">仅本机存储</span></header>
  <section class="grid">
    <div class="card"><h2>导入公开网页</h2><input id="url" placeholder="https://..."><div class="row"><button onclick="importUrl()">读取公开页</button></div><div class="notice">登录后的 BOSS/猎聘/脉脉页面请使用 Chrome 收藏扩展。</div></div>
    <div class="card"><h2>导入简历 PDF</h2><input id="pdf" type="file" accept="application/pdf"><div class="row"><button onclick="importPdf()">解析 PDF</button></div><div class="notice">文件不上传到云端，最大 12MB。</div></div>
    <div class="card"><h2>粘贴候选人文本</h2><textarea id="text" placeholder="粘贴简历或候选人资料..."></textarea><div class="row"><button onclick="importText()">清洗入库</button></div></div>
  </section>
  <div id="message" class="notice"></div>
  <section class="stats"><div class="stat"><b id="total">0</b>候选人</div><div class="stat"><b id="strong">0</b>强推</div><div class="stat"><b id="jdStrong">0</b>JD强推</div><div class="stat"><b id="platforms">0</b>数据源</div></section>
  <section class="card table-card"><div class="toolbar"><input id="search" placeholder="搜姓名、公司、项目或平台" oninput="load()"><button class="secondary" onclick="load()">刷新</button><button class="secondary" onclick="exportJd()">导出JD排序</button></div><div id="table"></div></section>
</div>
<dialog id="detail"><div class="modal-head"><b id="detailTitle"></b><button class="secondary" onclick="detail.close()">关闭</button></div><div class="modal-body" id="detailBody"></div></dialog>
<script>
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function msg(s,ok=true){$('message').className=ok?'notice ok':'notice error';$('message').textContent=s}
async function api(path,opt={}){const r=await fetch(path,opt);const j=await r.json().catch(()=>({detail:r.statusText}));if(!r.ok)throw Error(j.detail||'request failed');return j}
async function importUrl(){try{msg('正在读取...');await api('/api/import-url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:$('url').value})});msg('公开页已入库');load()}catch(e){msg(e.message,false)}}
async function importText(){try{await api('/api/import-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:$('text').value,title:'手动粘贴'})});$('text').value='';msg('文本已清洗入库');load()}catch(e){msg(e.message,false)}}
async function importPdf(){const f=$('pdf').files[0];if(!f)return msg('请先选择 PDF',false);try{await api('/api/import-file?filename='+encodeURIComponent(f.name),{method:'POST',headers:{'Content-Type':'application/pdf'},body:f});msg('PDF 已解析入库');load()}catch(e){msg(e.message,false)}}
async function load(){try{const q=encodeURIComponent($('search').value);const rows=await api('/api/candidates?q='+q);$('total').textContent=rows.length;$('strong').textContent=rows.filter(x=>x.score>=85).length;$('jdStrong').textContent=rows.filter(x=>x.jd_score>=65).length;$('platforms').textContent=new Set(rows.map(x=>x.platform)).size;if(!rows.length){$('table').innerHTML='<div class="empty">还没有数据。先导入 PDF，或在招聘网站点击收藏扩展。</div>';return}$('table').innerHTML='<table><thead><tr><th>候选人</th><th>来源</th><th>画像证据</th><th>JD对齐</th><th>评分</th><th></th></tr></thead><tbody>'+rows.map(r=>`<tr><td><b>${esc(r.name)}</b><br><span>${esc(r.location||'城市待核')}</span><br><small>${esc(r.undergraduate_school||'学历待核')} ${esc(r.undergraduate_tier)}</small></td><td>${esc(r.platform)}<br>${r.source_url?`<a href="${esc(r.source_url)}" target="_blank">原页</a>`:''}</td><td>${r.strengths.slice(0,4).map(x=>`<span class="pill">${esc(x)}</span>`).join('')}</td><td>${r.jd_score!=null?`<b>${r.jd_score}</b> ${esc(r.jd_recommendation||'')}`:'未算'}<br><small>${(r.risks||[]).slice(0,2).map(x=>esc(x)).join(' / ')}</small></td><td><span class="score ${r.score<70?'hot':''}">${r.score}</span><br>${esc(r.recommendation)}</td><td><button class="secondary" onclick="show(${r.id})">证据</button></td></tr>`).join('')+'</tbody></table>'}catch(e){msg(e.message,false)}}
async function exportJd(){try{const data=await api('/api/export-jd?min_score=50');const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jd_candidates_'+new Date().toISOString().slice(0,10)+'.json';a.click();msg('已导出 '+data.count+' 位候选人')}catch(e){msg(e.message,false)}}
async function show(id){const r=await api('/api/candidates/'+id);$('detailTitle').textContent=r.name+' · 画像'+r.score+'分'+(r.jd_score!=null?' · JD'+r.jd_score+'分':'');const fields=[['咨询',r.consulting_evidence],['甲方',r.inhouse_evidence],['产品',r.product_evidence],['品牌',r.brand_evidence],['渠道',r.channel_evidence],['客户/高层',r.client_evidence]];$('detailBody').innerHTML=fields.filter(x=>x[1]).map(x=>`<h3>${x[0]}</h3><p>${esc(x[1])}</p>`).join('')+(r.jd_scores?`<h3>JD 对齐分</h3><ul>${Object.entries(r.jd_scores).map(([k,v])=>`<li>${esc(k)}: ${v}</li>`).join('')}</ul>`:'')+`<h3>风险与待验证</h3><ul>${r.risks.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><h3>原始清洗文本</h3><div class="raw">${esc(r.raw_text)}</div>`;$('detail').showModal()}
load();
</script>
</body></html>
