<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    body{width:330px;padding:16px;font:14px/1.5 system-ui;background:#f7f4ed;color:#172026}
    h2{margin:0 0 8px}.note{font-size:12px;color:#6d746f;margin:9px 0}
    button{width:100%;padding:10px;border:0;border-radius:8px;background:#0d6f63;color:white;font-weight:700;cursor:pointer;margin-top:8px}
    button.stop{background:#a34734}button:disabled{opacity:.5;cursor:not-allowed}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
    label{font-size:12px;color:#6d746f}input{width:100%;box-sizing:border-box;margin-top:3px;padding:7px;border:1px solid #d2ccc0;border-radius:7px}
    #status{margin-top:10px;padding:9px;border-radius:8px;background:#ece8de;min-height:20px}
  </style>
</head>
<body>
  <h2>TTC 候选人阅读助手</h2>
  <div class="note">只读取你有权查看的页面。批量模式会从当前列表逐个打开候选人、收藏后关闭；遇到登录失效、验证码或访问限制立即停止。</div>
  <button id="capture">收藏当前页面</button>
  <button id="testLinks" class="secondary">测试识别当前列表</button>
  <div class="options">
    <label>本批数量<input id="limit" type="number" min="1" max="10" value="5"></label>
    <label>阅读间隔/秒<input id="delay" type="number" min="8" max="30" value="12"></label>
  </div>
  <button id="batch">自动阅读当前列表</button>
  <button id="gmail">自动下载 Gmail 简历附件</button>
  <button id="stop" class="stop">停止自动阅读</button>
  <div id="status">空闲</div>
  <pre id="debug"></pre>
  <script src="popup.js"></script>
</body>
</html>
