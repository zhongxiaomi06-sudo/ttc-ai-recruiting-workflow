# Add this location block inside the existing yorkteam.cn HTTPS server block.
# It keeps TalentMatch React as the only frontend and exposes TTC Daemon as
# a backend subsystem under /api/ttc/*.

location /api/ttc/ {
    proxy_pass http://127.0.0.1:8766/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /api/ttc;
    proxy_read_timeout 300;
}

