<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}TTC{% endblock %}</title>
<style>
  :root {
    --bg: #0a0a0f; --card: #13131a; --border: #1e1e2e;
    --text: #c8c8d4; --heading: #e8e8f0; --accent: #6c5ce7;
    --accent2: #00cec9; --green: #00b894; --red: #e17055;
    --yellow: #fdcb6e; --blue: #74b9ff;
    --code-bg: #0d0d14;
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body {
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.7;
  }
  header {
    background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 50%,#0a1a2e 100%);
    padding:24px 32px;border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
  }
  header h1 { font-size:1.4em;color:var(--heading); }
  header nav a { color:var(--accent2);text-decoration:none;margin-left:20px;font-size:.9em; }
  .container { max-width:1100px;margin:0 auto;padding:32px 24px 80px; }
  h2 { color:var(--heading);font-size:1.35em;margin:36px 0 14px;padding-bottom:6px;border-bottom:2px solid var(--accent);display:inline-block; }
  h3 { color:var(--accent2);font-size:1.05em;margin:24px 0 10px; }
  h4 { color:var(--blue);font-size:.95em;margin:16px 0 8px; }
  p { margin:8px 0; }
  ul,ol { margin:6px 0 6px 20px; }
  li { margin:3px 0; }
  table { width:100%;border-collapse:collapse;margin:12px 0;font-size:.9em; }
  th { background:#1a1a2e;color:var(--accent2);text-align:left;padding:10px 12px;font-weight:600;border-bottom:2px solid var(--border); }
  td { padding:8px 12px;border-bottom:1px solid var(--border); }
  tr:hover td { background:rgba(108,92,231,.04); }
  .card { background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin:14px 0; }
  .card.idea { border-left:4px solid var(--accent2); }
  .card.warn { border-left:4px solid var(--red); }
  .card.ok { border-left:4px solid var(--green); }
  .card.info { border-left:4px solid var(--blue); }
  .card .lbl { font-size:.72em;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-weight:700;color:#888; }
  .tag { display:inline-block;background:#1a1a2e;border:1px solid var(--border);padding:3px 10px;border-radius:14px;font-size:.78em;color:var(--accent2);margin-right:6px; }
  .btn { display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;text-decoration:none;font-size:.9em; }
  .btn:hover { background:#5b4bd4; }
  .btn.secondary { background:#1a1a2e;border:1px solid var(--border);color:var(--text); }
  .code { background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin:10px 0;overflow-x:auto;font-family:"SF Mono","Fira Code",monospace;font-size:.82em;color:var(--accent2);white-space:pre-wrap; }
  .score { font-weight:700;color:var(--accent2); }
  .risk { color:var(--red); }
  form label { display:block;margin:10px 0 4px;color:var(--heading);font-size:.9em; }
  form input[type="text"], form textarea, form select {
    width:100%;background:var(--code-bg);border:1px solid var(--border);border-radius:6px;
    padding:8px 10px;color:var(--text);font-family:inherit;
  }
  form textarea { min-height:80px; }
  .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
  @media (max-width:720px){ .grid-2 { grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>TTC AI 猎头工作台</h1>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/status">Status</a>
  </nav>
</header>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
